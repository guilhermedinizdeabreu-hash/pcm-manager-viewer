<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCM Manager — Visualizador</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#171b25;--surface2:#1e2433;--border:#2a3040;--accent:#e8c547;--accent2:#4ade80;--danger:#f87171;--warn:#fb923c;--text:#e8eaf0;--muted:#6b7280;--card:#1a1f2e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--accent)}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 2rem;background:var(--bg)}
.tab{padding:12px 20px;cursor:pointer;font-size:.85rem;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
.container{max-width:1400px;margin:0 auto;padding:2rem}
.page{display:none}.page.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem}
.stat-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.stat-value{font-family:'DM Mono',monospace;font-size:1.5rem;font-weight:500}
.stat-value.green{color:var(--accent2)}.stat-value.yellow{color:var(--accent)}.stat-value.red{color:var(--danger)}.stat-value.white{color:var(--text)}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:.72rem;font-weight:500}
.badge-green{background:#1a2e1a;color:var(--accent2)}.badge-red{background:#2e1a1a;color:var(--danger)}.badge-yellow{background:#2e2a1a;color:var(--accent)}.badge-gray{background:var(--surface2);color:var(--muted)}
.saldo-bar-bg{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden}
.saldo-bar-fill{height:100%;border-radius:4px}
.mono{font-family:'DM Mono',monospace;font-size:.82rem}
.pcm-table{width:100%;border-collapse:collapse;font-size:.84rem}
.pcm-table th{text-align:left;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:.72rem;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.pcm-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.pcm-table tr:hover td{background:var(--surface2)}
.pcm-num{font-family:'DM Mono',monospace;font-weight:500;color:var(--accent);font-size:.85rem;cursor:pointer}
.obra-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:1.5rem;overflow:hidden}
.obra-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.obra-header:hover{background:var(--surface2)}
.obra-title{font-family:'DM Serif Display',serif;font-size:1rem}
.obra-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border)}
.obra-stat{background:var(--card);padding:.9rem 1.2rem;text-align:center}
.obra-stat-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.obra-stat-value{font-family:'DM Mono',monospace;font-size:.95rem;font-weight:500}
.obra-pcm-list{padding:1rem 1.5rem}
.obra-pcm-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.obra-pcm-row:last-child{border-bottom:none}
.obra-pcm-num{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);min-width:90px;cursor:pointer}
.obra-pcm-desc{font-size:.78rem;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.obra-pcm-bar{width:120px;flex-shrink:0}
.obra-pcm-vals{font-family:'DM Mono',monospace;font-size:.75rem;min-width:130px;text-align:right}
.obra-filter-bar{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.obra-filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.78rem;cursor:pointer;font-family:'Instrument Sans',sans-serif}
.obra-filter-btn.active{background:var(--accent);color:#0f1117;border-color:var(--accent)}
.obra-chevron{transition:transform .2s;font-size:.8rem}
.obra-chevron.open{transform:rotate(180deg)}
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:none}
.detail-overlay.open{display:block}
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:500px;background:var(--surface);border-left:1px solid var(--border);z-index:151;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease}
.detail-panel.open{transform:translateX(0)}
.detail-header{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--surface)}
.detail-body{padding:1.5rem}
.detail-pcm{font-family:'DM Mono',monospace;font-size:1.1rem;color:var(--accent);font-weight:500}
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.detail-meta-item label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:3px}
.saldo-summary{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
.saldo-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.88rem}
.saldo-row.total{border-top:1px solid var(--border);margin-top:8px;padding-top:12px;font-weight:600}
.nf-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.nf-num{font-family:'DM Mono',monospace;font-size:.85rem;color:var(--accent)}
.nf-info{font-size:.78rem;color:var(--muted);margin-top:2px}
.nf-val{font-family:'DM Mono',monospace;font-size:.9rem;font-weight:500}
.readonly-badge{background:#1a1a2e;color:#7dd3fc;border:1px solid #2a2a4a;border-radius:20px;padding:3px 10px;font-size:.72rem}
.filters{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-family:'Instrument Sans',sans-serif;font-size:.84rem;min-width:180px}
.update-info{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.75rem;color:var(--muted);text-align:center;margin-bottom:1.5rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:'Instrument Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:5px 10px;font-size:.78rem}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
@media(max-width:768px){.stats-grid{grid-template-columns:1fr 1fr}.detail-panel{width:100%}}
</style>
</head>
<body>
<header>
  <div class="logo">PCM Manager <span style="color:var(--text);opacity:.5;font-size:.9rem;font-family:'Instrument Sans',sans-serif;margin-left:8px">Visualizador</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="readonly-badge">👁 Somente leitura</span>
  </div>
</header>
<div class="tabs">
  <div class="tab active" data-tab="obras">🏗️ Por Obra</div>
  <div class="tab" data-tab="pcms">📋 Todos os PCMs</div>
</div>
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div><div class="detail-pcm" id="dp-num"></div><div style="font-size:.9rem;color:var(--muted);margin-top:4px" id="dp-desc"></div></div>
    <button class="btn btn-secondary btn-sm" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body">
    <div class="detail-meta" id="dp-meta"></div>
    <div class="saldo-summary" id="dp-saldo"></div>
    <div style="font-size:.82rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Pedidos de Compra</div>
    <div id="dp-nfs"></div>
  </div>
</div>
<div class="page active" id="page-obras">
  <div class="container">
    <div class="update-info" id="update-info"></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Aprovado</div><div class="stat-value yellow" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Consumido</div><div class="stat-value white" id="stat-consumido">—</div></div>
      <div class="stat-card"><div class="stat-label">Saldo Disponível</div><div class="stat-value green" id="stat-saldo">—</div></div>
      <div class="stat-card"><div class="stat-label">PCMs Ativos</div><div class="stat-value white" id="stat-count">—</div></div>
    </div>
    <div class="obra-filter-bar" id="obra-filter-bar"></div>
    <div id="obras-list"></div>
  </div>
</div>
<div class="page" id="page-pcms">
  <div class="container">
    <div style="font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:1rem">Todos os PCMs</div>
    <div class="filters">
      <input type="text" class="filter-input" placeholder="🔍 Buscar..." id="search-input" oninput="renderPCMTable()">
      <select class="filter-input" id="filter-status" onchange="renderPCMTable()">
        <option value="">Todos os status</option>
        <option>Aberto</option><option>Encerrado</option><option>Suspenso</option><option>Não Aprovado</option>
      </select>
    </div>
    <div style="overflow-x:auto">
      <table class="pcm-table">
        <thead><tr><th>Nº PCM</th><th>Obra</th><th>Descrição</th><th>Fornecedor</th><th>Tipo</th><th>Aprovado</th><th>Consumido</th><th>Saldo</th><th>Status</th></tr></thead>
        <tbody id="pcm-tbody"></tbody>
      </table>
    </div>
    <div id="pcm-empty" class="empty-state" style="display:none"><div style="font-size:3rem;opacity:.4;margin-bottom:1rem">📋</div><div>Nenhum PCM encontrado.</div></div>
  </div>
</div>

function renderStats(){
  var ta=pcms.reduce(function(s,p){return s+(p.valor_aprovado||0);},0);
  var tc=pcms.reduce(function(s,p){return s+nfSum(p);},0);
  var sl=ta-tc;
  document.getElementById('stat-total').textContent=fmt(ta);
  document.getElementById('stat-consumido').textContent=fmt(tc);
  document.getElementById('stat-saldo').textContent=fmt(sl);
  document.getElementById('stat-saldo').className='stat-value '+(sl<0?'red':'green');
  document.getElementById('stat-count').textContent=pcms.filter(function(p){return p.status==='Aberto';}).length;
}
function renderObras(filtro){
  if(filtro!==undefined) obraFiltroAtivo=filtro;
  var obraMap={};
  pcms.forEach(function(p){var o=p.unidade||'(Sem obra)';if(!obraMap[o])obraMap[o]=[];obraMap[o].push(p);});
  var obras=Object.keys(obraMap).sort();
  document.getElementById('obra-filter-bar').innerHTML=
    [['todas','Todas'],['com_saldo','Com saldo'],['sem_consumo','Sem consumo'],['nao_aprovados','Não aprovados'],['alerta','🚨 Alertas']]
    .map(function(f){return '<button class="obra-filter-btn '+(obraFiltroAtivo===f[0]?'active':'')+'" onclick="renderObras(''+f[0]+'')">'+f[1]+'</button>';}).join('')+
    obras.map(function(o){return '<button class="obra-filter-btn '+(obraFiltroAtivo===o?'active':'')+'" onclick="renderObras(''+o.replace(/'/g,"\'")+'')" style="font-size:.72rem">🏗 '+(o.length>20?o.slice(0,20)+'…':o)+'</button>';}).join('');
  var lista=Object.entries(obraMap);
  if(obraFiltroAtivo==='com_saldo') lista=lista.filter(function(e){return e[1].some(function(p){return p.valor_aprovado-nfSum(p)>0&&p.status!=='Não Aprovado';});});
  else if(obraFiltroAtivo==='sem_consumo') lista=lista.filter(function(e){return e[1].some(function(p){return nfSum(p)===0&&p.status!=='Não Aprovado';});});
  else if(obraFiltroAtivo==='nao_aprovados') lista=lista.filter(function(e){return e[1].some(function(p){return p.status==='Não Aprovado';});});
  else if(obraFiltroAtivo==='alerta') lista=lista.filter(function(e){return e[1].some(function(p){return(p.nfs||[]).some(function(n){return n.alerta_nao_aprov;});});});
  else if(obraFiltroAtivo!=='todas') lista=lista.filter(function(e){return e[0]===obraFiltroAtivo;});
  if(!lista.length){document.getElementById('obras-list').innerHTML='<div class="empty-state"><div style="font-size:3rem;opacity:.4;margin-bottom:1rem">🔍</div><div>Nenhuma obra encontrada.</div></div>';return;}
  document.getElementById('obras-list').innerHTML=lista.map(function(entry){
    var obra=entry[0],ps=entry[1];
    var ap=ps.filter(function(p){return p.status!=='Não Aprovado';}),na=ps.filter(function(p){return p.status==='Não Aprovado';});
    var sc=ap.filter(function(p){return nfSum(p)===0;}),al=ps.filter(function(p){return(p.nfs||[]).some(function(n){return n.alerta_nao_aprov;});});

    var cid='obra-'+obra.replace(/[^a-z0-9]/gi,'_');
    var rows=ps.map(function(p){
      var c=nfSum(p),sd=p.valor_aprovado-c,pp=Math.min(100,p.valor_aprovado>0?(c/p.valor_aprovado)*100:0);
      var bpc=pp>90?'var(--danger)':pp>70?'var(--warn)':'var(--accent2)';
      var nap=p.status==='Não Aprovado',scP=!nap&&c===0,alP=(p.nfs||[]).some(function(n){return n.alerta_nao_aprov;});
      return '<div class="obra-pcm-row" style="'+(nap?'opacity:.75':'')+'">' +
        '<div class="obra-pcm-num" onclick="openDetail(''+p.id+'')">'+p.num_pcm+(alP?' <span style="color:var(--danger);font-size:.7rem">🚨</span>':'')+'</div>' +
        '<div class="obra-pcm-desc" title="'+p.descricao+'">'+p.descricao+'</div>' +
        '<span class="badge '+(nap?'badge-red':scP?'badge-gray':'badge-green')+'" style="font-size:.65rem;flex-shrink:0">'+(nap?'Não Aprov':scP?'Sem consumo':'Consumindo')+'</span>' +
        '<div class="obra-pcm-bar">'+(nap?'<div style="text-align:center;color:var(--danger);font-size:.72rem">—</div>':'<div class="saldo-bar-bg"><div class="saldo-bar-fill" style="width:'+pp+'%;background:'+bpc+'"></div></div>')+'</div>' +
        '<div class="obra-pcm-vals">'+(nap?'<span style="color:var(--danger)">'+fmt(p.valor_aprovado)+'</span>':'<span style="color:var('+(sd<0?'--danger':'--accent2')+')">'+fmt(sd)+'</span> <span style="color:var(--muted);font-size:.7rem">saldo</span>')+'</div>' +
      '</div>';
    }).join('');
    return '<div class="obra-card">' +
      '<div class="obra-header" onclick="toggleObra(''+cid+'')">' +
        '<div><div class="obra-title">🏗️ '+obra+'</div>' +
        '<div style="font-size:.75rem;color:var(--muted);margin-top:3px">'+ps.length+' PCM(s)'+(na.length?' • <span style="color:var(--danger)">'+na.length+' não aprovado(s)</span>':'')+'</div></div>' +
        '<div style="display:flex;align-items:center;gap:1.5rem">' +
          '<div style="text-align:right"><div style="font-size:.72rem;color:var(--muted);margin-bottom:3px">'+Math.round(pct)+'% consumido</div>' +
          '<div style="width:120px"><div class="saldo-bar-bg" style="height:8px"><div class="saldo-bar-fill" style="width:'+pct+'%;background:'+bc+'"></div></div></div></div>' +
          '<span class="obra-chevron open" id="chev-'+cid+'">▼</span>' +
        '</div>' +
      '</div>' +
      '<div class="obra-stats">' +
        '<div class="obra-stat"><div class="obra-stat-label">Aprovado</div><div class="obra-stat-value" style="color:var(--accent)">'+fmt(ta)+'</div></div>' +
        '<div class="obra-stat"><div class="obra-stat-label">Consumido</div><div class="obra-stat-value">'+fmt(tc)+'</div></div>' +
        '<div class="obra-stat"><div class="obra-stat-label">Saldo</div><div class="obra-stat-value" style="color:'+(sl<0?'var(--danger)':'var(--accent2)')+'">'+fmt(sl)+'</div></div>' +
        '<div class="obra-stat"><div class="obra-stat-label">Sem consumo</div><div class="obra-stat-value" style="color:var(--muted)">'+sc.length+'</div></div>' +
        '<div class="obra-stat"><div class="obra-stat-label">Não aprov.</div><div class="obra-stat-value" style="color:'+(na.length?'var(--danger)':'var(--muted)')+'">'+na.length+'</div></div>' +
      '</div>' +
      '<div id="'+cid+'" class="obra-pcm-list">' +
        '<div style="display:grid;grid-template-columns:90px 1fr 100px 120px 130px;gap:8px;padding:4px 0 8px;border-bottom:1px solid var(--border);font-size:.68rem;color:var(--muted);text-transform:uppercase">' +
          '<span>Nº PCM</span><span>Descrição</span><span>Status</span><span>Consumo</span><span style="text-align:right">Saldo</span>' +
        '</div>'+rows+
      '</div>' +
    '</div>';
  }).join('');
}

      '<div class="nf-info">'+(nf.data?new Date(nf.data+'T00:00:00').toLocaleDateString('pt-BR'):'')+(nf.obs?' • '+nf.obs:'')+'</div></div>' +
      '<div class="nf-val">'+fmt(nf.valor)+'</div></div>';
  }).join(''):'<div style="color:var(--muted);font-size:.84rem;padding:1rem 0">Nenhum pedido vinculado.</div>';
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');document.getElementById('detail-panel').classList.remove('open');}
renderStats();
renderObras();
</script>
</body>
</html>
